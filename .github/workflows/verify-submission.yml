name: Verify Submission

on:
  issues:
    types: [opened]

jobs:
  verify:
    if: contains(github.event.issue.labels.*.name, 'submission')
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: write
      issues: write
      pull-requests: write
      models: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: .github/scripts/package-lock.json

      - name: Install dependencies
        run: npm ci
        working-directory: .github/scripts

      - name: Retrieve contributor email
        id: retrieve-email
        run: |
          RESPONSE=$(curl -sf -H "Authorization: Bearer ${{ secrets.INTER_SVC_TOKEN }}" \
            "${{ secrets.WORKER_URL }}/api/email/${{ github.event.issue.number }}" || echo '{"error":"not_found"}')
          EMAIL=$(echo "$RESPONSE" | node -e "process.stdin.resume();let d='';process.stdin.on('data',c=>d+=c);process.stdin.on('end',()=>{try{const r=JSON.parse(d);console.log(r.email||'')}catch{console.log('')}})")
          if [ -z "$EMAIL" ]; then
            echo "email_missing=true" >> $GITHUB_OUTPUT
            echo "contributor_email=" >> $GITHUB_OUTPUT
          else
            echo "email_missing=false" >> $GITHUB_OUTPUT
            echo "contributor_email=$EMAIL" >> $GITHUB_OUTPUT
          fi

      - name: Run AI verification
        id: verify
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          CONTRIBUTOR_EMAIL: ${{ steps.retrieve-email.outputs.contributor_email }}
        run: npx tsx verify-agent.ts
        working-directory: .github/scripts

      # --- VERIFIED branch ---
      - name: Create content file and PR
        if: steps.verify.outputs.status == 'VERIFIED'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          CONTENT: ${{ steps.verify.outputs.content }}
          CATEGORY: ${{ steps.verify.outputs.category }}
          CONTENT_PATH: ${{ steps.verify.outputs.content_path }}
          SOURCE_URL: ${{ steps.verify.outputs.source_url }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: npx tsx create-content-file.ts
        working-directory: .github/scripts

      - name: Label issue — Verified
        if: steps.verify.outputs.status == 'VERIFIED'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, labels: ['Verified'] });
            await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, name: 'pending-review' }).catch(() => {});

      - name: Email contributor — Verified
        if: steps.verify.outputs.status == 'VERIFIED' && steps.retrieve-email.outputs.email_missing == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ steps.verify.outputs.contributor_email }}
          from: Australia.md Archive <${{ secrets.GMAIL_ADDRESS }}>
          subject: "Your submission to Australia.md has been verified (#${{ github.event.issue.number }})"
          body: |
            Your submission (Issue #${{ github.event.issue.number }}) has been verified and a pull request has been opened.
            
            Issue: ${{ github.event.issue.html_url }}
            
            Thank you for contributing to the Australia.md archive.

      # --- REJECTED branch ---
      - name: Label issue — Needs Fix
        if: steps.verify.outputs.status == 'REJECTED'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, labels: ['Needs Fix'] });
            await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, name: 'pending-review' }).catch(() => {});
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: `**Verification failed.** Reason: ${{ steps.verify.outputs.rejection_reason }}\n\nPlease update your submission and re-submit.` });

      - name: Email contributor — Rejected
        if: steps.verify.outputs.status == 'REJECTED' && steps.retrieve-email.outputs.email_missing == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ steps.verify.outputs.contributor_email }}
          from: Australia.md Archive <${{ secrets.GMAIL_ADDRESS }}>
          subject: "Action required: your Australia.md submission needs a fix (#${{ github.event.issue.number }})"
          body: |
            Your submission (Issue #${{ github.event.issue.number }}) could not be verified.
            
            Reason: ${{ steps.verify.outputs.rejection_reason }}
            
            Please review your submission and source URL, then re-submit.
            Issue: ${{ github.event.issue.html_url }}

      # --- SCRAPE_BLOCKED branch ---
      - name: Label issue — Scrape Blocked
        if: steps.verify.outputs.status == 'SCRAPE_BLOCKED'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.addLabels({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, labels: ['Scrape Blocked', 'Pending Human Review'] });
            await github.rest.issues.removeLabel({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, name: 'pending-review' }).catch(() => {});
            await github.rest.issues.createComment({ owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: 'The source URL could not be fetched for automated verification. This submission has been queued for manual admin review.' });

      - name: Notify admin — Scrape Blocked
        if: steps.verify.outputs.status == 'SCRAPE_BLOCKED'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ secrets.ADMIN_EMAIL }}
          from: Australia.md Archive <${{ secrets.GMAIL_ADDRESS }}>
          subject: "[Admin] Scrape blocked — manual review required (#${{ github.event.issue.number }})"
          body: |
            Submission Issue #${{ github.event.issue.number }} could not be automatically verified — source URL was not scrapeable.
            Please review manually: ${{ github.event.issue.html_url }}

      - name: Email contributor — Scrape Blocked
        if: steps.verify.outputs.status == 'SCRAPE_BLOCKED' && steps.retrieve-email.outputs.email_missing == 'false'
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 465
          secure: true
          username: ${{ secrets.GMAIL_ADDRESS }}
          password: ${{ secrets.GMAIL_APP_PASSWORD }}
          to: ${{ steps.verify.outputs.contributor_email }}
          from: Australia.md Archive <${{ secrets.GMAIL_ADDRESS }}>
          subject: "Update on your Australia.md submission (#${{ github.event.issue.number }})"
          body: |
            Your submission (Issue #${{ github.event.issue.number }}) has been queued for manual admin review — the source URL could not be fetched automatically.
            You will receive a further update once the review is complete.
            Issue: ${{ github.event.issue.html_url }}
