<!-- ═══════════════════════════════════════════════════════════
     AUSTRALIA.MD — SHARED SVG ASSETS
     All symbols are public domain (Wikimedia Commons / own drawings).
     Include this file for reference — actual SVGs are embedded inline.

     SYMBOLS PROVIDED:
       1. Australian National Flag (accurate)
       2. Rod of Asclepius (medical symbol)
       3. Australian Coat of Arms (simplified heraldic elements)
       4. Commonwealth Star (7-pointed)
       5. Golden Wattle emblem
═══════════════════════════════════════════════════════════ -->

<!-- ── 1. AUSTRALIAN NATIONAL FLAG (accurate proportions 1:2) ──────────
     Blue Ensign: Union Jack (canton), Commonwealth Star (bottom left),
     Southern Cross five stars (fly side).
     Source: Flag of Australia Act 1953; public domain.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 30" id="svg-aus-flag">
  <!-- Blue field -->
  <rect width="60" height="30" fill="#00008B"/>

  <!-- ── Union Jack (canton, top-left 1/4 of flag) ── -->
  <g clip-path="url(#uj-clip)">
    <!-- White diagonal cross (St Andrew's saltire background) -->
    <line x1="0" y1="0" x2="30" y2="15" stroke="white" stroke-width="6"/>
    <line x1="30" y1="0" x2="0" y2="15" stroke="white" stroke-width="6"/>
    <!-- Red diagonal cross (St Patrick's cross) -->
    <line x1="0" y1="0" x2="30" y2="15" stroke="#CC0000" stroke-width="2"/>
    <line x1="30" y1="0" x2="0" y2="15" stroke="#CC0000" stroke-width="2"/>
    <!-- White upright cross (St George's cross) -->
    <rect x="12" y="0" width="6" height="15" fill="white"/>
    <rect x="0" y="6" width="30" height="3" fill="white"/>
    <!-- Red upright cross (St George's cross) -->
    <rect x="13.5" y="0" width="3" height="15" fill="#CC0000"/>
    <rect x="0" y="6.75" width="30" height="1.5" fill="#CC0000"/>
  </g>
  <clipPath id="uj-clip"><rect width="30" height="15"/></clipPath>

  <!-- ── Commonwealth Star (7-pointed, below Union Jack) ── -->
  <polygon points="7.5,17 8.4,20.2 11.7,20.2 9.15,22.1 10.05,25.3 7.5,23.4 4.95,25.3 5.85,22.1 3.3,20.2 6.6,20.2"
           fill="white"/>

  <!-- ── Southern Cross ── -->
  <!-- Alpha Crucis (largest — bottom) -->
  <polygon points="49,22 49.7,24.3 52,24.3 50.2,25.6 50.9,27.9 49,26.6 47.1,27.9 47.8,25.6 46,24.3 48.3,24.3"
           fill="white"/>
  <!-- Beta Crucis (right) -->
  <polygon points="56,15.5 56.54,17.3 58.4,17.3 56.93,18.35 57.47,20.1 56,19.05 54.53,20.1 55.07,18.35 53.6,17.3 55.46,17.3"
           fill="white"/>
  <!-- Gamma Crucis (top) -->
  <polygon points="49,17 49.54,18.8 51.4,18.8 49.93,19.85 50.47,21.6 49,20.55 47.53,21.6 48.07,19.85 46.6,18.8 48.46,18.8"
           fill="white"/>
  <!-- Delta Crucis (left) -->
  <polygon points="42,20 42.54,21.8 44.4,21.8 42.93,22.85 43.47,24.6 42,23.55 40.53,24.6 41.07,22.85 39.6,21.8 41.46,21.8"
           fill="white"/>
  <!-- Epsilon Crucis (small — right of gamma) -->
  <polygon points="53,20 53.35,21.1 54.5,21.1 53.57,21.72 53.93,22.8 53,22.18 52.07,22.8 52.43,21.72 51.5,21.1 52.65,21.1"
           fill="white"/>
</svg>
